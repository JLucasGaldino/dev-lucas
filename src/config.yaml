site:
  name: Lucas Galdino
  site: 'https://lucasgaldino.com'
  base: '/'
  trailingSlash: false
  # googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: 'Diseño web para clínicas y profesionales de la salud en Alicante'
    template: '%s — Lucas Galdino'
  description: 'Diseño web profesional, SEO local y gestión de redes sociales para clínicas, fisioterapeutas y psicólogos en Alicante. Más pacientes con presencia digital.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Lucas Galdino
    images:
      - url: '~/assets/images/true.png' # ⚠️ replace with a real 1200×628px OG image
        width: 1200
        height: 628
    type: website
  # twitter:
  #   handle: '@arthelokyo'
  #   site: '@arthelokyo'
  #   cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system'
